<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" width="80" height="96">
  <defs>
    <style>
      .ghost-wrap {
        transform-origin: 40px 48px;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%,100% { transform: translateY(0px); }
        50%     { transform: translateY(-8px); }
      }

      .ghost-body {
        animation: body-pulse 3s ease-in-out infinite;
      }
      @keyframes body-pulse {
        0%,100% { fill-opacity: 0.13; }
        50%     { fill-opacity: 0.22; }
      }

      .ghost-eyes {
        animation: blink 5s ease-in-out infinite;
      }
      @keyframes blink {
        0%,84%,100% { opacity: 1;    }
        88%          { opacity: 0.08; }
      }

      .ghost-shadow {
        animation: shadow-pulse 3s ease-in-out infinite;
      }
      @keyframes shadow-pulse {
        0%,100% { rx: 18; ry: 4; opacity: 0.18; }
        50%     { rx: 14; ry: 3; opacity: 0.08; }
      }
    </style>
  </defs>

  <!-- Drop shadow on floor -->
  <ellipse class="ghost-shadow"
    cx="40" cy="90" rx="18" ry="4"
    fill="#E84142" opacity="0.18"/>

  <!-- Floating ghost -->
  <g class="ghost-wrap">
    <path class="ghost-body"
      d="M40 4C20.67 4 5 19.67 5 39V86L15.5 75.5L26 86L40 75.5L54 86L64.5 75.5L75 86V39C75 19.67 59.33 4 40 4Z"
      fill="#E84142" fill-opacity="0.13"
      stroke="#E84142" stroke-width="2.2" stroke-linejoin="round"/>

    <g class="ghost-eyes">
      <circle cx="28" cy="40" r="5" fill="#E84142" fill-opacity="0.85"/>
      <circle cx="52" cy="40" r="5" fill="#E84142" fill-opacity="0.85"/>
    </g>

    <path d="M30 52Q40 60 50 52"
      stroke="#E84142" stroke-width="2.5"
      stroke-linecap="round" fill="none"
      stroke-opacity="0.65"/>
  </g>
</svg>
