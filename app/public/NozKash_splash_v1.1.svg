<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <style>
      /* ─────────────────────────────────────────────
         TIMELINE
         0.0s – 2.4s  ghost spins + shrinks/grows
         2.4s – 3.1s  ghost settles, wordmark appears
         3.1s → ∞     float loop, eyes blink, glow
      ───────────────────────────────────────────── */

      /* Vortex spin rings — expand while ghost spins */
      .vring {
        fill: none;
        stroke: #E84142;
        transform-origin: 195px 390px;
      }
      .vr1 { stroke-width:1.0; animation: vring 2.4s 0.0s ease-out forwards; }
      .vr2 { stroke-width:0.7; animation: vring 2.4s 0.2s ease-out forwards; }
      .vr3 { stroke-width:0.4; animation: vring 2.4s 0.4s ease-out forwards; }
      @keyframes vring {
        0%   { r:4;   stroke-opacity:0.7; }
        50%  { stroke-opacity:0.3; }
        100% { r:220; stroke-opacity:0; }
      }

      /* Spinning trail circles — ghost leaves a trail as it spins */
      .trail {
        fill: #E84142;
        transform-origin: 195px 390px;
      }
      .t1 { animation: trail-orbit 0.7s 0.0s linear infinite,  trail-fade 2.4s 0.0s ease-in forwards; }
      .t2 { animation: trail-orbit 0.7s 0.1s linear infinite,  trail-fade 2.4s 0.1s ease-in forwards; }
      .t3 { animation: trail-orbit 0.7s 0.15s linear infinite, trail-fade 2.4s 0.15s ease-in forwards; }
      .t4 { animation: trail-orbit 0.7s 0.2s linear infinite,  trail-fade 2.4s 0.2s ease-in forwards; }
      .t5 { animation: trail-orbit 0.7s 0.25s linear infinite, trail-fade 2.4s 0.25s ease-in forwards; }
      .t6 { animation: trail-orbit 0.9s 0.05s linear infinite, trail-fade 2.4s 0.05s ease-in forwards; }
      .t7 { animation: trail-orbit 0.9s 0.3s linear infinite,  trail-fade 2.4s 0.3s ease-in forwards; }
      .t8 { animation: trail-orbit 1.1s 0.0s linear infinite,  trail-fade 2.4s 0.0s ease-in forwards; }

      @keyframes trail-orbit { to { transform: rotate(360deg); } }
      @keyframes trail-fade {
        0%   { fill-opacity: 0.55; }
        70%  { fill-opacity: 0.3;  }
        100% { fill-opacity: 0;    }
      }

      /* ── GHOST VORTEX SPIN ──
         Spins 4 full rotations while shrinking then expanding,
         like a vortex pulling in then spitting out */
      .ghost-spin-wrap {
        transform-origin: 195px 390px;
      }

      /* Ghost body pulse */
      .ghost-body-el {
        animation: body-spin-pulse 2.4s 0s ease-in-out forwards,
                   body-float-pulse 3s 3.1s ease-in-out infinite;
      }
      @keyframes body-spin-pulse {
        0%   { fill-opacity: 0;    }
        20%  { fill-opacity: 0.22; }
        80%  { fill-opacity: 0.18; }
        100% { fill-opacity: 0.13; }
      }
      @keyframes body-float-pulse {
        0%,100% { fill-opacity: 0.13; }
        50%     { fill-opacity: 0.22; }
      }

      /* Eyes appear at end of spin */
      .ghost-eyes-el {
        animation: eyes-appear 0.4s 2.2s ease-out both,
                   blink 5s 3.5s ease-in-out infinite;
      }
      @keyframes eyes-appear {
        from { opacity: 0; transform: scale(0.4); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes blink {
        0%,84%,100% { opacity: 1;   }
        88%          { opacity: 0.08; }
      }

      /* Smile */
      .ghost-smile-el {
        animation: smile-appear 0.35s 2.35s ease-out both;
      }
      @keyframes smile-appear {
        from { stroke-opacity: 0; }
        to   { stroke-opacity: 0.65; }
      }

      /* Float after settle */
      .ghost-float-wrap {
        transform-origin: 195px 390px;
        animation: ghost-float 3s 3.1s ease-in-out infinite;
      }
      @keyframes ghost-float {
        0%,100% { transform: translateY(0px);  }
        50%     { transform: translateY(-11px); }
      }

      /* Orbit rings — appear after spin settles */
      .orbit-ring {
        fill: none;
        stroke: #E84142;
        stroke-dasharray: 3 14;
        transform-origin: 195px 390px;
      }
      .or1 {
        stroke-width: 0.7;
        animation:
          orbit-appear 0.6s 2.5s ease-out both,
          or-spin      5s   2.5s linear infinite;
      }
      .or2 {
        stroke-width: 0.4;
        animation:
          orbit-appear 0.6s 2.6s ease-out both,
          or-spin-r    7s   2.6s linear infinite;
      }
      @keyframes orbit-appear { from{opacity:0;stroke-opacity:0} to{stroke-opacity:0.3} }
      @keyframes or-spin   { to { transform: rotate(360deg);  } }
      @keyframes or-spin-r { to { transform: rotate(-360deg); } }

      /* Orbiting dots */
      .odot { transform-origin: 195px 390px; }
      .od1 { animation: orbit-appear 0.5s 2.5s ease-out both, od-spin  3.5s 2.5s linear infinite; }
      .od2 { animation: orbit-appear 0.5s 2.7s ease-out both, od-spin  3.5s 2.7s linear infinite; }
      .od3 { animation: orbit-appear 0.5s 2.6s ease-out both, od-spinr 4.5s 2.6s linear infinite; }
      @keyframes od-spin  { to { transform: rotate(360deg);  } }
      @keyframes od-spinr { to { transform: rotate(-360deg); } }

      /* ── WORDMARK ── */
      .wordmark-g {
        animation: wm-up 0.65s 2.5s cubic-bezier(.34,1.3,.64,1) both;
      }
      @keyframes wm-up {
        from { opacity:0; transform:translateY(20px); }
        to   { opacity:1; transform:translateY(0);    }
      }
      .ghost-red-text { animation: red-pulse 3s 3.1s ease-in-out infinite; }
      @keyframes red-pulse {
        0%,100% { fill:#E84142; }
        50%     { fill:#FF6465; }
      }

      /* Tagline */
      .tagline-g { animation: wm-up 0.6s 2.75s ease-out both; }

      /* Loading bar */
      .load-g { animation: wm-up 0.4s 2.4s ease-out both; }

      /* Version */
      .ver-g { animation: wm-up 0.5s 3.0s ease-out both; }

      /* Settle flash — quick white flash when ghost lands */
      .settle-flash {
        animation: flash 0.35s 2.35s ease-out both;
      }
      @keyframes flash {
        0%   { opacity:0; }
        30%  { opacity:0.12; }
        100% { opacity:0; }
      }
    </style>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E84142" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#E84142" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="clip"><rect width="390" height="844"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#0F0F0F"/>

  <g clip-path="url(#clip)">

    <!-- Ambient glow -->
    <circle cx="195" cy="390" r="200" fill="url(#glow)">
      <animate attributeName="r" values="120;200;120" dur="3s" begin="3.1s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0;1;0" dur="2.4s" begin="0s" fill="freeze"/>
      <animate attributeName="fill-opacity" values="0.6;1;0.6" dur="3s" begin="3.1s" repeatCount="indefinite"/>
    </circle>

    <!-- Vortex rings -->
    <circle class="vring vr1" cx="195" cy="390" r="4"/>
    <circle class="vring vr2" cx="195" cy="390" r="4"/>
    <circle class="vring vr3" cx="195" cy="390" r="4"/>

    <!-- Trail dots at various orbit radii -->
    <g class="trail t1"><circle cx="255" cy="390" r="3.5"/></g>
    <g class="trail t2"><circle cx="195" cy="450" r="3" transform="rotate(45 195 390)"/></g>
    <g class="trail t3"><circle cx="265" cy="390" r="2.5" transform="rotate(90 195 390)"/></g>
    <g class="trail t4"><circle cx="245" cy="390" r="3" transform="rotate(135 195 390)"/></g>
    <g class="trail t5"><circle cx="255" cy="390" r="2" transform="rotate(200 195 390)"/></g>
    <g class="trail t6"><circle cx="220" cy="330" r="2.5"/></g>
    <g class="trail t7"><circle cx="275" cy="390" r="2" transform="rotate(270 195 390)"/></g>
    <g class="trail t8"><circle cx="195" cy="320" r="2"/></g>

    <!-- Orbit rings (post-spin) -->
    <circle class="orbit-ring or1" cx="195" cy="390" r="88"/>
    <circle class="orbit-ring or2" cx="195" cy="390" r="116"/>

    <!-- Orbiting dots -->
    <g class="odot od1"><circle cx="283" cy="390" r="3" fill="#E84142" fill-opacity="0.7"/></g>
    <g class="odot od2"><circle cx="195" cy="478" r="2" fill="#E84142" fill-opacity="0.5" transform="rotate(120 195 390)"/></g>
    <g class="odot od3"><circle cx="311" cy="390" r="2" fill="#E84142" fill-opacity="0.45" transform="rotate(60 195 390)"/></g>

    <!-- ── GHOST — spins 4× (1440°) in 2.4s, shrinks to 0.3 at midpoint then grows back to 1 ── -->
    <g class="ghost-spin-wrap">
      <!-- Rotation: 0 → 1440deg over 2.4s (4 full turns), easing out at end -->
      <animateTransform attributeName="transform" type="rotate"
        from="0 195 390" to="1440 195 390"
        dur="2.4s" begin="0s"
        calcMode="spline" keySplines="0.2 0 0.3 1"
        fill="freeze"/>

      <!-- Scale: starts at 0, grows to 1.1 then bounces to 1 -->
      <!-- We nest a scale group separately so rotation pivot stays correct -->
      <g>
        <animateTransform attributeName="transform" type="scale"
          values="0; 0.5; 1.15; 0.95; 1"
          keyTimes="0; 0.3; 0.85; 0.93; 1"
          dur="2.4s" begin="0s"
          calcMode="spline"
          keySplines="0.4 0 0.6 1; 0.34 1.4 0.64 1; 0.4 0 0.6 1; 0.4 0 0.6 1"
          additive="sum" fill="freeze"/>

        <!-- Float after spin settles -->
        <g class="ghost-float-wrap">

          <!-- Ghost body — centred at 195,390, drawn 76×92 (scale 2) -->
          <g transform="translate(157, 344)">

            <path class="ghost-body-el"
              d="M19 2C9.61 2 2 9.61 2 19V42L7.5 36.5L13 42L19 36.5L25 42L30.5 36.5L36 42V19C36 9.61 28.39 2 19 2Z"
              fill="#E84142" fill-opacity="0"
              stroke="#E84142" stroke-width="1.5" stroke-linejoin="round"
              transform="scale(2)"/>

            <!-- Stroke animate separately so it appears -->
            <path
              d="M38 4C19.22 4 4 19.22 4 38V84L15 73L26 84L38 73L50 84L61 73L72 84V38C72 19.22 56.78 4 38 4Z"
              fill="none"
              stroke="#E84142" stroke-width="2" stroke-linejoin="round"
              stroke-opacity="0">
              <animate attributeName="stroke-opacity"
                values="0; 0.6; 0.8; 0.7; 0.8"
                keyTimes="0; 0.15; 0.6; 0.85; 1"
                dur="2.4s" begin="0s" fill="freeze"/>
            </path>

            <!-- Eyes -->
            <g class="ghost-eyes-el" transform-origin="38 46">
              <circle cx="26" cy="38" r="5" fill="#E84142" fill-opacity="0.88"/>
              <circle cx="50" cy="38" r="5" fill="#E84142" fill-opacity="0.88"/>
            </g>

            <!-- Smile -->
            <path class="ghost-smile-el"
              d="M28 50Q38 58 48 50"
              stroke="#E84142" stroke-width="2.5"
              stroke-linecap="round" fill="none" stroke-opacity="0"/>

          </g>
        </g>
      </g>
    </g>

    <!-- Settle flash (white circle burst when ghost lands) -->
    <circle class="settle-flash" cx="195" cy="390" r="60" fill="#FFFFFF"/>

    <!-- ── WORDMARK ── -->
    <g class="wordmark-g">
      <text y="540"
        font-family="'DM Sans','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="600" font-size="34" letter-spacing="-1"
        text-anchor="middle">
        <tspan x="195" fill="#FFFFFF">Noz</tspan>
        <tspan class="ghost-red-text" fill="#E84142">Kash</tspan>
      </text>
    </g>

    <!-- Tagline -->
    <g class="tagline-g">
      <text x="195" y="584"
        font-family="'DM Sans','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="13" fill="#FFFFFF" fill-opacity="0.32"
        text-anchor="middle" letter-spacing="0.4">
        Send money. Leave no trace.
      </text>
    </g>

    <!-- Loading bar -->
    <g class="load-g">
      <rect x="135" y="636" width="120" height="2" rx="1"
            fill="#FFFFFF" fill-opacity="0.07"/>
      <rect x="135" y="636" width="0" height="2" rx="1" fill="#E84142">
        <animate attributeName="width"
          from="0" to="120"
          dur="1.0s" begin="2.4s"
          calcMode="spline" keySplines="0.4 0 0.2 1"
          fill="freeze"/>
      </rect>
    </g>

    <!-- Version -->
    <g class="ver-g">
      <text x="195" y="674"
        font-family="'DM Mono','Courier New',monospace"
        font-size="10" fill="#FFFFFF" fill-opacity="0.18"
        text-anchor="middle" letter-spacing="2">
        BUILT ON AVALANCHE
      </text>
    </g>

  </g>
</svg>
